<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header class="main-header">
            <div class="header-content">
                <h1>Smart Product Price Match</h1>
                <p>Find the best deals across Amazon, Flipkart, and more.</p>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </header>

        <div class="search-container">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Search for a product (e.g., iPhone 15)..." required
                    autocomplete="off">
                <button type="submit" id="search-btn" aria-label="Search">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>
        
        <div id="controls-container" class="controls-container hidden">
            <div class="control-group">
                <label for="sort-select">Sort By</label>
                <select id="sort-select">
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Best Rating</option>
                </select>
            </div>
            <div class="control-group">
                <label for="platform-filter">Platform</label>
                <select id="platform-filter">
                    <option value="all">All Platforms</option>
                </select>
            </div>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scanning the web for the best prices...</p>
        </div>

        <div id="results-container" class="hidden">
            <div class="results-header">
                <h2>Best Deals Found</h2>
                <span id="result-count"></span>
            </div>

            <div class="comparison-grid" id="comparison-grid">
                <!-- Results will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
